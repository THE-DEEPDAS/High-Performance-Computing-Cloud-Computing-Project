<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPI Test Runner</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; max-width: 900px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 1rem; }
    button { padding: 0.6rem 1rem; cursor: pointer; }
    pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; border-radius: 8px; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h2>MPI Backend Test</h2>
  <p class="muted">Upload a grid .txt file and call <code>/run</code>.</p>

  <div class="card">
    <input id="fileInput" type="file" accept=".txt" />
    <button id="runBtn">Run MPI</button>
    <p id="status"></p>
  </div>

  <h3>Response</h3>
  <pre id="result">No response yet.</pre>

  <script>
    const runBtn = document.getElementById('runBtn');
    const fileInput = document.getElementById('fileInput');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    runBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        statusEl.textContent = 'Please choose a .txt file first.';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      statusEl.textContent = 'Running MPI job...';
      resultEl.textContent = 'Waiting...';

      try {
        const res = await fetch('/run', {
          method: 'POST',
          body: formData,
        });

        const json = await res.json();
        if (!res.ok) {
          statusEl.textContent = 'Job failed.';
          resultEl.textContent = JSON.stringify(json, null, 2);
          return;
        }

        statusEl.textContent = 'Job completed successfully.';
        resultEl.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        statusEl.textContent = 'Request failed.';
        resultEl.textContent = String(err);
      }
    });
  </script>
</body>
</html>
